name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: cd-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/oscar-portfolio

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add pinned deploy host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_IMAGE: ${{ env.IMAGE_NAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_READ_USERNAME: ${{ secrets.GHCR_READ_USERNAME }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" /bin/sh <<EOF
          set -eu

          docker_config=''
          if [ -n "${GHCR_READ_USERNAME:-}" ] && [ -n "${GHCR_READ_TOKEN:-}" ]; then
            docker_config="$(mktemp -d)"
            trap 'rm -rf "$docker_config"' EXIT
            printf '%s' "$GHCR_READ_TOKEN" | docker --config "$docker_config" login ghcr.io -u "$GHCR_READ_USERNAME" --password-stdin
          fi

          if grep -q 'racso1999/portfolio:linuxamd64' "$DEPLOY_PATH/docker-compose.yml"; then
            sed -i "s|racso1999/portfolio:linuxamd64|$GHCR_IMAGE:latest|g" "$DEPLOY_PATH/docker-compose.yml"
          fi

          if [ -n "$docker_config" ]; then
            docker --config "$docker_config" compose -f "$DEPLOY_PATH/docker-compose.yml" pull app
            docker --config "$docker_config" compose -f "$DEPLOY_PATH/docker-compose.yml" up -d app
          else
            docker compose -f "$DEPLOY_PATH/docker-compose.yml" pull app
            docker compose -f "$DEPLOY_PATH/docker-compose.yml" up -d app
          fi

          docker image prune -f
          EOF
